# .github/workflows/draft-pdf.yml

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'        # run when you push v1.2.3 style tags

jobs:
  paper-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create/upload a Release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # ... your existing steps that call openjournals/openjournals-draft-action
      # and produce paper/paper.pdf ...

      - name: Upload artifact (paper.pdf)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paper
          path: paper/paper.pdf

      # ⬇️ Replace EndBug/add-and-commit with these two steps ⬇️
      - name: Create release (if not exists)
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload paper.pdf to the release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: paper/paper.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
