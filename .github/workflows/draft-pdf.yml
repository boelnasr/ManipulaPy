# .github/workflows/draft-pdf.yml

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'        # run when you push v1.2.3 style tags

jobs:
  paper-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create/upload a Release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ... your existing steps that call openjournals/openjournals-draft-action
      # and produce paper/paper.pdf ...

      - name: Upload artifact (paper.pdf)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: paper
          path: paper/paper.pdf

      # ⬇️ Replace EndBug/add-and-commit with these two steps ⬇️
      - name: Create release (if not exists)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload paper.pdf to the release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: paper/paper.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
