# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the
# GitHub Advanced Security code scanning feature.  For more information on
# the Codacy security scan action usage and parameters, see
# https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.

name: Codacy Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '20 0 * * 2'

permissions:
  contents: read

jobs:
  codacy-security-scan:
    permissions:
      contents: read # for actions/checkout to fetch code
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository to the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@v6

      # Execute Codacy Analysis CLI as a non-blocking quality smoke check.
      #
      # The SARIF is intentionally NOT uploaded to GitHub code scanning. Codacy
      # emits one SARIF run per tool (Bandit, Pylint, Prospector, Trivy, ...);
      # github/codeql-action/upload-sarif@v4 rejects that multi-run-per-category
      # file ("multiple SARIF runs with the same category"), and the quality
      # linters flooded the Security tab with thousands of style alerts that are
      # not vulnerabilities. Codacy still runs here; supply-chain findings come
      # from the separate Scorecard workflow. max-allowed-issues keeps this step
      # green so it never blocks a PR.
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08
        with:
          verbose: true
          max-allowed-issues: 2147483647
