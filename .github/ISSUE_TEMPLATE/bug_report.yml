name: Bug report
description: Report something that is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the sections below so we can reproduce and fix the issue quickly.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: A minimal, self-contained code snippet or sequence of steps that triggers the bug.
      placeholder: |
        ```python
        from ManipulaPy import ...
        # ...
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened, including the full traceback if there is one.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide your environment details.
      value: |
        - ManipulaPy version:
        - Python version:
        - OS:
        - GPU / CUDA (if relevant):
        - PyTorch / CuPy version (if relevant):
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (URDF files, screenshots, related issues).
    validations:
      required: false
